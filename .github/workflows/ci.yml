name: ci

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.x"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile
        run: python -m py_compile colortablething.py
      - name: Help
        run: python colortablething.py --help
      - name: Format help
        run: python colortablething.py --format-help
      - name: List built-in tables
        run: python colortablething.py --list-tables
